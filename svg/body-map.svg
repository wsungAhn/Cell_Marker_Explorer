<svg viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="body-map-title body-map-desc">
  <title id="body-map-title">Interactive human body map</title>
  <desc id="body-map-desc">Anatomical body map with twelve keyboard-accessible tissue system regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      max-width: 600px;
      height: auto;
      margin: 0 auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .body-region {
      cursor: pointer;
      outline: none;
      pointer-events: all;
    }

    .region-path,
    .hit-area {
      pointer-events: all;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke: var(--body-outline);
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hit-area {
      fill: transparent;
      stroke: transparent;
    }

    .body-region:hover .region-path,
    .body-region:focus .region-path,
    .body-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(0 0 8px var(--hover-glow));
    }

    .body-region:focus-visible .region-path,
    .body-region.selected .region-path,
    .body-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 3;
    }

    .surface-line {
      fill: none;
      stroke: var(--body-outline);
      stroke-width: 1;
      stroke-linecap: round;
      opacity: 0.35;
      pointer-events: none;
    }

    .blood-line {
      fill: none;
      stroke: #C8D5E0;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.68;
      pointer-events: none;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-line {
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 1;
      opacity: 0.75;
      pointer-events: none;
    }

    @media (max-width: 767px) {
      .labels-layer {
        display: none;
      }
    }
  </style>

  <rect class="bg" width="600" height="900" fill="var(--bg-primary)"/>

  <g id="integumentary" class="body-region" data-tissue-system="integumentary" role="button" tabindex="0" aria-label="Integumentary System">
    <title>Integumentary System</title>
