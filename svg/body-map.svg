<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" class="body-map-svg" role="img" aria-label="Human body map for cell marker exploration">
  <title>Human body map</title>
  <desc>Anterior anatomical body map with twelve keyboard-accessible tissue system regions.</desc>
  <defs>
    <style>
      .body-outline-path,.detail-line,.system-line{fill:none;stroke-linecap:round;stroke-linejoin:round}
      .body-outline-path{stroke-width:1.5}
      .detail-line{stroke:#333;stroke-width:1;opacity:.45;pointer-events:none}
      .system-line{pointer-events:none}
      .region-path{stroke:#333;stroke-width:1;stroke-linecap:round;stroke-linejoin:round}
      .hit-area{fill:transparent;stroke:transparent;pointer-events:all}
      .body-region{cursor:pointer}
      #skin{pointer-events:stroke}
      #skin .region-path{fill:none;stroke:#F5D5C8;stroke-width:10;opacity:.72}
      .label-text{font:600 11px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#333;paint-order:stroke;stroke:#FAF9F3;stroke-width:3px;stroke-linejoin:round}
      .label-line{fill:none;stroke:#777;stroke-width:1;opacity:.7}
    </style>
  </defs>

