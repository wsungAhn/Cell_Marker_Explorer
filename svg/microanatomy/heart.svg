<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="heart-microanatomy-title heart-microanatomy-desc">
  <title id="heart-microanatomy-title">Heart microanatomy</title>
  <desc id="heart-microanatomy-desc">Keyboard-accessible microanatomy diagram for Heart with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M404 526 C205 396 112 268 148 159 C180 61 302 63 400 166 C498 63 620 61 652 159 C688 268 596 396 404 526 Z"/>
  <g class="regions-layer">
    <g id="myocardium" class="microstructure-region" data-microstructure="myocardium" role="button" tabindex="0" aria-label="Myocardium">
      <title>Myocardium</title>
      <desc>The muscular tissue of the heart wall responsible for contraction.</desc>
      <path class="region-path" d="M404 526 C205 396 112 268 148 159 C180 61 302 63 400 166 C498 63 620 61 652 159 C688 268 596 396 404 526 Z" fill="#E8A0A0" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M272 178 C286 288 338 378 404 452 C465 381 520 292 532 180 M210 246 C294 250 350 292 400 356 C450 292 506 250 590 246"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="myocardium" x="400" y="304" text-anchor="middle">Myocardium</text>
  </g>
</svg>
