<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Heart microanatomy — myocardium">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Myocardium (Cardiac Muscle)</text>

  <!-- Myocardium: whole tissue is the single clickable region -->
  <g id="myocardium" class="microstructure-region" data-microstructure="myocardium"
     role="button" tabindex="0" aria-label="Myocardium — click to view cell types">
    <title>Myocardium</title>
    <desc>Cardiac muscle: branching striated cardiomyocytes joined by intercalated discs, with resident cardiac macrophages.</desc>
    <rect class="region-path" x="100" y="80" width="600" height="440" rx="14" fill="#E8A0A0" stroke="#a85a5a" stroke-width="2.5"/>
    <!-- branching cardiomyocyte fibres (wavy bands) -->
    <g stroke="#c46d6d" stroke-width="16" fill="none" opacity="0.55" stroke-linecap="round">
      <path d="M120,150 q160,-30 320,10 q160,40 320,-10"/>
      <path d="M120,230 q160,40 320,0 q160,-40 320,10"/>
      <path d="M120,310 q160,-30 320,10 q160,40 320,-10"/>
      <path d="M120,390 q160,40 320,0 q160,-40 320,10"/>
      <path d="M120,460 q160,-25 320,8 q160,33 320,-8"/>
    </g>
    <!-- intercalated discs (dark step junctions) -->
    <g stroke="#7e3b3b" stroke-width="3" opacity="0.7">
      <line x1="260" y1="138" x2="260" y2="172"/><line x1="440" y1="150" x2="440" y2="184"/><line x1="600" y1="146" x2="600" y2="180"/>
      <line x1="300" y1="218" x2="300" y2="252"/><line x1="500" y1="220" x2="500" y2="254"/>
      <line x1="260" y1="298" x2="260" y2="332"/><line x1="440" y1="310" x2="440" y2="344"/><line x1="600" y1="306" x2="600" y2="340"/>
      <line x1="300" y1="378" x2="300" y2="412"/><line x1="500" y1="380" x2="500" y2="414"/>
    </g>
    <!-- striations (faint cross-bands) -->
    <g stroke="#fff" stroke-width="1" opacity="0.25">
      <path d="M120,150 q160,-30 320,10 q160,40 320,-10" fill="none" stroke-dasharray="2 8"/>
      <path d="M120,310 q160,-30 320,10 q160,40 320,-10" fill="none" stroke-dasharray="2 8"/>
    </g>
    <!-- cardiomyocyte nuclei (central, oval) -->
    <g fill="#8a4a4a">
      <ellipse cx="280" cy="160" rx="9" ry="5"/><ellipse cx="460" cy="172" rx="9" ry="5"/>
      <ellipse cx="330" cy="240" rx="9" ry="5"/><ellipse cx="520" cy="238" rx="9" ry="5"/>
      <ellipse cx="280" cy="320" rx="9" ry="5"/><ellipse cx="470" cy="330" rx="9" ry="5"/>
      <ellipse cx="340" cy="400" rx="9" ry="5"/><ellipse cx="520" cy="398" rx="9" ry="5"/>
    </g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="myocardium" x="400" y="555" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Myocardium — branching striated cardiomyocytes + intercalated discs</text>
  </g>
</svg>
