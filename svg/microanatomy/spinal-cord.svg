<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Spinal cord microanatomy — white and gray matter">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Spinal Cord (Cross-section)</text>

  <!-- White matter: outer ring -->
  <g id="spinal-cord-white-matter" class="microstructure-region" data-microstructure="spinal-cord-white-matter"
     role="button" tabindex="0" aria-label="White Matter — click to view cell types">
    <title>White Matter</title>
    <desc>Outer myelinated tracts of the spinal cord, rich in oligodendrocytes and astrocytes.</desc>
    <ellipse class="region-path" cx="400" cy="300" rx="250" ry="210" fill="#F5E6A3" stroke="#b9a35a" stroke-width="2.5"/>
    <!-- myelinated tract texture -->
    <g fill="#e6d488" opacity="0.6"><circle cx="300" cy="170" r="6"/><circle cx="500" cy="170" r="6"/><circle cx="610" cy="300" r="6"/><circle cx="500" cy="430" r="6"/><circle cx="300" cy="430" r="6"/><circle cx="190" cy="300" r="6"/></g>
  </g>

  <!-- Gray matter: inner butterfly/H shape (on top) -->
  <g id="spinal-cord-gray-matter" class="microstructure-region" data-microstructure="spinal-cord-gray-matter"
     role="button" tabindex="0" aria-label="Gray Matter — click to view cell types">
    <title>Gray Matter</title>
    <desc>Central butterfly-shaped gray matter containing neuronal cell bodies, microglia, and ependymal cells lining the central canal.</desc>
    <path class="region-path" d="M400,200
      C470,200 470,250 520,260 C560,268 560,330 520,340 C470,352 470,400 400,400
      C330,400 330,352 280,340 C240,330 240,268 280,260 C330,250 330,200 400,200 Z"
      fill="#cbb56a" stroke="#9a8540" stroke-width="2.5"/>
    <!-- central canal -->
    <circle cx="400" cy="300" r="14" fill="#fff" stroke="#9a8540" stroke-width="2"/>
    <!-- motor neurons (ventral horns) -->
    <g fill="#8a7030"><circle cx="320" cy="350" r="9"/><circle cx="480" cy="350" r="9"/><circle cx="345" cy="255" r="7"/><circle cx="455" cy="255" r="7"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="spinal-cord-white-matter" x="660" y="200" font-size="12" fill="var(--text-secondary)">White matter</text>
    <text class="region-label" data-for="spinal-cord-gray-matter" x="400" y="300" text-anchor="middle" font-size="11" fill="#7a6020">Gray</text>
  </g>
</svg>
