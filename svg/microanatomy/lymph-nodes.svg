<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Lymph node microanatomy — germinal center">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Germinal Center</text>
  <g id="germinal-center" class="microstructure-region" data-microstructure="germinal-center"
     role="button" tabindex="0" aria-label="Germinal Center — click to view cell types">
    <title>Germinal Center</title>
    <desc>Reactive lymphoid follicle: a pale germinal center (dark + light zones) surrounded by a dense mantle of small B cells.</desc>
    <!-- node cortex background -->
    <ellipse cx="400" cy="300" rx="320" ry="210" fill="#C8D5E0" opacity="0.3" stroke="#7a93a8" stroke-width="2"/>
    <!-- follicle with germinal centre (clickable) -->
    <circle class="region-path" cx="400" cy="300" r="170" fill="#dbe6ee" stroke="#7a93a8" stroke-width="2.5"/>
    <!-- mantle zone (dense rim) -->
    <circle cx="400" cy="300" r="170" fill="none" stroke="#8fa6bd" stroke-width="22" opacity="0.55"/>
    <!-- germinal centre light + dark zones -->
    <circle cx="400" cy="300" r="115" fill="#eef4f8" stroke="#a8c0d0" stroke-width="1.5"/>
    <path d="M400,185 a115,115 0 0,1 0,230 z" fill="#9fb4c8" opacity="0.4"/>
    <text x="360" y="305" text-anchor="middle" font-size="10" fill="#5a6ba0">dark</text>
    <text x="450" y="305" text-anchor="middle" font-size="10" fill="#7a93a8">light</text>
    <!-- centroblasts/centrocytes -->
    <g fill="#7a93b8">
      <circle cx="350" cy="260" r="6"/><circle cx="370" cy="300" r="6"/><circle cx="345" cy="340" r="6"/><circle cx="390" cy="270" r="6"/><circle cx="380" cy="330" r="6"/>
      <circle cx="440" cy="270" r="5"/><circle cx="460" cy="310" r="5"/><circle cx="430" cy="345" r="5"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="germinal-center" x="400" y="545" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Germinal Center — dark/light zones + mantle of B cells</text>
  </g>
</svg>
