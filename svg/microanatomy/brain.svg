<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Brain microanatomy — cortex, cerebellum, choroid plexus, microglia">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Brain Regions</text>

  <!-- Cerebral cortex: outer gray-matter band -->
  <g id="cerebral-cortex" class="microstructure-region" data-microstructure="cerebral-cortex"
     role="button" tabindex="0" aria-label="Cerebral Cortex — click to view cell types">
    <title>Cerebral Cortex</title>
    <desc>Outer gray-matter band of folded cortex with layered pyramidal neurons and astrocytes.</desc>
    <path class="region-path" d="M70,300 q0,-180 180,-180 q120,0 150,70 q-90,20 -90,110 q0,90 90,110 q-30,70 -150,70 q-180,0 -180,-180 z"
      fill="#F5E6A3" stroke="#b9a35a" stroke-width="2.5"/>
    <!-- gyri/sulci folds -->
    <g fill="none" stroke="#cbb56a" stroke-width="5" opacity="0.6">
      <path d="M120,200 q30,20 10,50"/><path d="M120,400 q30,-20 10,-50"/><path d="M100,300 q40,0 50,0"/>
    </g>
    <!-- pyramidal neurons -->
    <g fill="#8a7030"><circle cx="160" cy="250" r="6"/><circle cx="180" cy="300" r="6"/><circle cx="160" cy="350" r="6"/></g>
  </g>

  <!-- Cerebellum: foliated structure (bottom right) -->
  <g id="cerebellum" class="microstructure-region" data-microstructure="cerebellum"
     role="button" tabindex="0" aria-label="Cerebellum — click to view cell types">
    <title>Cerebellum</title>
    <desc>Foliated cerebellar cortex with Purkinje cells between molecular and granule layers.</desc>
    <path class="region-path" d="M470,420 q40,-90 150,-90 q120,0 130,90 q-10,80 -130,80 q-110,0 -150,-80 z"
      fill="#f0dd92" stroke="#b9a35a" stroke-width="2.5"/>
    <!-- folia -->
    <g fill="none" stroke="#cbb56a" stroke-width="4" opacity="0.7">
      <path d="M520,400 q10,30 0,60"/><path d="M580,390 q10,35 0,70"/><path d="M640,400 q10,30 0,60"/>
    </g>
    <!-- Purkinje cells (row) -->
    <g fill="#9c6a3a"><circle cx="540" cy="430" r="6"/><circle cx="600" cy="425" r="6"/><circle cx="655" cy="435" r="6"/></g>
  </g>

  <!-- Choroid plexus: ventricular tuft (top right) -->
  <g id="choroid-plexus" class="microstructure-region" data-microstructure="choroid-plexus"
     role="button" tabindex="0" aria-label="Choroid Plexus — click to view cell types">
    <title>Choroid Plexus</title>
    <desc>Ventricular tuft of fronded epithelium that produces cerebrospinal fluid.</desc>
    <g class="region-path" fill="#e3b0c8" stroke="#b87a98" stroke-width="2">
      <ellipse cx="560" cy="180" rx="26" ry="16"/><ellipse cx="600" cy="160" rx="24" ry="14"/><ellipse cx="640" cy="185" rx="26" ry="16"/><ellipse cx="600" cy="205" rx="24" ry="14"/><ellipse cx="555" cy="215" rx="22" ry="13"/>
    </g>
  </g>

  <!-- Microglia: scattered stellate overlay -->
  <g id="brain-microglia" class="microstructure-region" data-microstructure="brain-microglia"
     role="button" tabindex="0" aria-label="Brain Microglia — click to view cell types">
    <title>Brain Microglia</title>
    <desc>Resident immune cells of the CNS: small stellate cells scattered through the parenchyma.</desc>
    <g class="region-path" stroke="#6a8a4a" stroke-width="2.5" fill="none">
      <g transform="translate(330,460)"><circle r="7" fill="#9bbb59" stroke="none"/><line x1="0" y1="-7" x2="0" y2="-22"/><line x1="6" y1="5" x2="18" y2="16"/><line x1="-6" y1="5" x2="-18" y2="16"/><line x1="7" y1="-2" x2="22" y2="-6"/><line x1="-7" y1="-2" x2="-22" y2="-6"/></g>
      <g transform="translate(420,200)"><circle r="7" fill="#9bbb59" stroke="none"/><line x1="0" y1="-7" x2="0" y2="-22"/><line x1="6" y1="5" x2="18" y2="16"/><line x1="-6" y1="5" x2="-18" y2="16"/><line x1="7" y1="-2" x2="22" y2="-6"/></g>
      <g transform="translate(250,470)"><circle r="7" fill="#9bbb59" stroke="none"/><line x1="0" y1="-7" x2="0" y2="-22"/><line x1="6" y1="5" x2="18" y2="16"/><line x1="-6" y1="5" x2="-18" y2="16"/></g>
    </g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="cerebral-cortex" x="160" y="300" text-anchor="middle" font-size="11" fill="var(--text-secondary)">Cortex</text>
    <text class="region-label" data-for="cerebellum" x="600" y="475" text-anchor="middle" font-size="11" fill="var(--text-secondary)">Cerebellum</text>
    <text class="region-label" data-for="choroid-plexus" x="600" y="245" text-anchor="middle" font-size="10" fill="var(--text-secondary)">Choroid plexus</text>
    <text class="region-label" data-for="brain-microglia" x="330" y="500" text-anchor="middle" font-size="10" fill="#6a8a4a">Microglia</text>
  </g>
</svg>
