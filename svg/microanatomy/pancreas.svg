<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Pancreas microanatomy — acini and islets">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Acini &amp; Islets of Langerhans</text>

  <!-- Acini: exocrine berry-clusters (background) -->
  <g id="pancreatic-acini" class="microstructure-region" data-microstructure="pancreatic-acini"
     role="button" tabindex="0" aria-label="Pancreatic Acini — click to view cell types">
    <title>Pancreatic Acini</title>
    <desc>Berry-cluster exocrine units of acinar cells secreting digestive enzymes into a central duct.</desc>
    <rect class="region-path" x="100" y="80" width="600" height="440" rx="14" fill="#D4A574" stroke="#8a6a3f" stroke-width="2" opacity="0.3"/>
    <!-- acinar clusters -->
    <g fill="#d8a8a0" stroke="#a86a5a" stroke-width="1.5">
      <g transform="translate(200,180)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
      <g transform="translate(360,160)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
      <g transform="translate(250,330)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
      <g transform="translate(420,420)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
      <g transform="translate(600,200)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
      <g transform="translate(580,400)"><circle cx="0" cy="-16" r="12"/><circle cx="15" cy="-6" r="12"/><circle cx="12" cy="12" r="12"/><circle cx="-12" cy="12" r="12"/><circle cx="-15" cy="-6" r="12"/></g>
    </g>
  </g>

  <!-- Islet: pale endocrine island (on top, clickable) -->
  <g id="islets-of-langerhans" class="microstructure-region" data-microstructure="islets-of-langerhans"
     role="button" tabindex="0" aria-label="Islets of Langerhans — click to view cell types">
    <title>Islets of Langerhans</title>
    <desc>Pale endocrine islands of beta, alpha, and delta cells embedded among the exocrine acini.</desc>
    <circle class="region-path" cx="470" cy="290" r="92" fill="#f3e6c8" stroke="#c9a86a" stroke-width="2.5"/>
    <!-- beta (center), alpha (periphery), delta -->
    <g fill="#7aa8cf"><circle cx="470" cy="290" r="9"/><circle cx="450" cy="270" r="9"/><circle cx="490" cy="275" r="9"/><circle cx="455" cy="310" r="9"/><circle cx="495" cy="312" r="9"/><circle cx="470" cy="330" r="9"/></g>
    <g fill="#cf8a6a"><circle cx="420" cy="250" r="8"/><circle cx="525" cy="255" r="8"/><circle cx="415" cy="330" r="8"/><circle cx="528" cy="332" r="8"/></g>
    <g fill="#9bbb59"><circle cx="470" cy="232" r="6"/><circle cx="470" cy="348" r="6"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="pancreatic-acini" x="200" y="450" font-size="12" fill="var(--text-secondary)">Acini</text>
    <text class="region-label" data-for="islets-of-langerhans" x="470" y="210" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Islet</text>
  </g>
</svg>
