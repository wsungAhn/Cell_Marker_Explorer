<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="pancreas-microanatomy-title pancreas-microanatomy-desc">
  <title id="pancreas-microanatomy-title">Pancreas microanatomy</title>
  <desc id="pancreas-microanatomy-desc">Keyboard-accessible microanatomy diagram for Pancreas with 2 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M98 328 C169 215 266 182 398 202 C516 219 596 165 704 111 C729 214 694 311 604 371 C493 446 354 428 229 480 C135 519 69 422 98 328 Z"/>
  <g class="regions-layer">
    <g id="acini" class="microstructure-region" data-microstructure="acini" role="button" tabindex="0" aria-label="Pancreatic Acini">
      <title>Pancreatic Acini</title>
      <desc>Exocrine units producing digestive enzymes.</desc>
      <path class="region-path" d="M98 328 C169 215 266 182 398 202 C516 219 596 165 704 111 C729 214 694 311 604 371 C493 446 354 428 229 480 C135 519 69 422 98 328 Z" fill="#D4A574" fill-opacity="0.92"/>
    </g>
    <g id="islets" class="microstructure-region" data-microstructure="islets" role="button" tabindex="0" aria-label="Islets of Langerhans">
      <title>Islets of Langerhans</title>
      <desc>Endocrine cell clusters producing insulin, glucagon, and other hormones.</desc>
      <path class="region-path" d="M452 246 C506 207 588 220 617 272 C587 325 501 340 447 297 C434 278 436 260 452 246 Z" fill="#D4A574" fill-opacity="0.82"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="acini" x="251" y="354" text-anchor="middle">Pancreatic Acini</text>
    <text class="region-label" data-for="islets" x="510" y="279" text-anchor="middle">Islets of Langerhans</text>
  </g>
</svg>
