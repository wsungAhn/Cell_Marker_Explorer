<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="skin-microanatomy-title skin-microanatomy-desc">
  <title id="skin-microanatomy-title">Skin microanatomy</title>
  <desc id="skin-microanatomy-desc">Keyboard-accessible microanatomy diagram for Skin with 3 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M90 118 H710 V502 H90 Z"/>
  <g class="regions-layer">
    <g id="epidermis" class="microstructure-region" data-microstructure="epidermis" role="button" tabindex="0" aria-label="Epidermis">
      <title>Epidermis</title>
      <desc>The outermost layer of the skin, composed of stratified squamous epithelium.</desc>
      <path class="region-path" d="M90 118 H710 V206 H90 Z" fill="#F5D5C8" fill-opacity="0.92"/>
    </g>
    <g id="dermis" class="microstructure-region" data-microstructure="dermis" role="button" tabindex="0" aria-label="Dermis">
      <title>Dermis</title>
      <desc>The thick inner layer of skin containing connective tissue, blood vessels, and nerve endings.</desc>
      <path class="region-path" d="M90 206 H710 V386 H90 Z" fill="#F5D5C8" fill-opacity="0.82"/>
    </g>
    <g id="hypodermis" class="microstructure-region" data-microstructure="hypodermis" role="button" tabindex="0" aria-label="Hypodermis (Subcutaneous Adipose)">
      <title>Hypodermis (Subcutaneous Adipose)</title>
      <desc>The deepest layer of skin composed primarily of adipose tissue.</desc>
      <path class="region-path" d="M90 386 H710 V502 H90 Z" fill="#F5D5C8" fill-opacity="0.72"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M112 147 H690 M112 178 H690 M132 238 C206 217 280 246 354 226 C428 206 502 239 576 220 C622 208 662 213 690 225 M132 334 C214 314 286 344 370 326 C455 308 528 335 668 318 M120 444 C160 416 200 472 240 444 C280 416 320 472 360 444 C400 416 440 472 480 444 C520 416 560 472 600 444 C640 416 680 472 710 444"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="epidermis" x="390" y="166" text-anchor="middle">Epidermis</text>
    <text class="region-label" data-for="dermis" x="390" y="302" text-anchor="middle">Dermis</text>
    <text class="region-label label-small" data-for="hypodermis" x="390" y="455" text-anchor="middle">Hypodermis (Subcutaneous Adipose)</text>
  </g>
</svg>
