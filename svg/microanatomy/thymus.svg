<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Thymus microanatomy — cortex and medulla">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Thymic Cortex &amp; Medulla</text>

  <!-- Cortex: dense outer zone -->
  <g id="thymic-cortex" class="microstructure-region" data-microstructure="thymic-cortex"
     role="button" tabindex="0" aria-label="Thymic Cortex — click to view cell types">
    <title>Thymic Cortex</title>
    <desc>Dense outer cortex packed with developing thymocytes (DN/DP) under cortical epithelial cells.</desc>
    <ellipse class="region-path" cx="400" cy="300" rx="280" ry="210" fill="#C8D5E0" stroke="#7a93a8" stroke-width="2.5"/>
    <!-- dense thymocytes -->
    <g fill="#7a93b8">
      <circle cx="300" cy="180" r="6"/><circle cx="340" cy="160" r="6"/><circle cx="260" cy="220" r="6"/><circle cx="500" cy="180" r="6"/><circle cx="540" cy="210" r="6"/><circle cx="220" cy="300" r="6"/><circle cx="580" cy="300" r="6"/><circle cx="260" cy="400" r="6"/><circle cx="300" cy="430" r="6"/><circle cx="500" cy="420" r="6"/><circle cx="540" cy="400" r="6"/><circle cx="190" cy="250" r="6"/><circle cx="610" cy="250" r="6"/><circle cx="190" cy="350" r="6"/><circle cx="610" cy="350" r="6"/>
    </g>
  </g>

  <!-- Medulla: pale inner zone with Hassall's corpuscle -->
  <g id="thymic-medulla" class="microstructure-region" data-microstructure="thymic-medulla"
     role="button" tabindex="0" aria-label="Thymic Medulla — click to view cell types">
    <title>Thymic Medulla</title>
    <desc>Pale inner medulla with medullary epithelial cells and Hassall's corpuscles; fewer, mature thymocytes.</desc>
    <ellipse class="region-path" cx="400" cy="300" rx="150" ry="115" fill="#e3ecf3" stroke="#a8c0d0" stroke-width="2.5"/>
    <!-- Hassall's corpuscle (concentric whorl) -->
    <g fill="none" stroke="#c0a0b0" stroke-width="3"><circle cx="400" cy="300" r="40"/><circle cx="400" cy="300" r="26"/><circle cx="400" cy="300" r="13"/></g>
    <!-- sparse mature thymocytes -->
    <g fill="#9aafc8"><circle cx="330" cy="280" r="5"/><circle cx="470" cy="320" r="5"/><circle cx="360" cy="350" r="5"/><circle cx="450" cy="255" r="5"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="thymic-cortex" x="400" y="120" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Cortex</text>
    <text class="region-label" data-for="thymic-medulla" x="400" y="300" text-anchor="middle" font-size="11" fill="#7a93a8">Medulla</text>
  </g>
</svg>
