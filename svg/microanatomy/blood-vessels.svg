<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Blood vessel microanatomy — intima, media, adventitia">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Vessel Wall (Tunica Layers)</text>

  <!-- Adventitia: outer connective ring -->
  <g id="vessel-adventitia" class="microstructure-region" data-microstructure="vessel-adventitia"
     role="button" tabindex="0" aria-label="Vessel Adventitia — click to view cell types">
    <title>Vessel Adventitia</title>
    <desc>Outer tunica adventitia: connective tissue with fibroblasts and vasa vasorum.</desc>
    <circle class="region-path" cx="400" cy="300" r="240" fill="#E8A0A0" stroke="#a85a5a" stroke-width="2.5"/>
    <g fill="none" stroke="#c97a7a" stroke-width="2" opacity="0.5"><circle cx="400" cy="300" r="225"/><circle cx="400" cy="300" r="210"/></g>
  </g>

  <!-- Media: middle smooth-muscle layer -->
  <g id="vessel-media" class="microstructure-region" data-microstructure="vessel-media"
     role="button" tabindex="0" aria-label="Vessel Media — click to view cell types">
    <title>Vessel Media</title>
    <desc>Middle tunica media: concentric smooth-muscle cells and elastic laminae.</desc>
    <circle class="region-path" cx="400" cy="300" r="180" fill="#e8b8b8" stroke="#b86a6a" stroke-width="2.5"/>
    <!-- circumferential smooth muscle bands -->
    <g fill="none" stroke="#c98a8a" stroke-width="10" opacity="0.6"><circle cx="400" cy="300" r="165"/><circle cx="400" cy="300" r="140"/></g>
    <!-- smooth muscle nuclei -->
    <g fill="#8a4a4a"><ellipse cx="400" cy="145" rx="6" ry="3"/><ellipse cx="540" cy="240" rx="3" ry="6"/><ellipse cx="540" cy="360" rx="3" ry="6"/><ellipse cx="400" cy="455" rx="6" ry="3"/><ellipse cx="260" cy="360" rx="3" ry="6"/><ellipse cx="260" cy="240" rx="3" ry="6"/></g>
  </g>

  <!-- Intima: inner endothelial lining -->
  <g id="vessel-intima" class="microstructure-region" data-microstructure="vessel-intima"
     role="button" tabindex="0" aria-label="Vessel Intima (Endothelium) — click to view cell types">
    <title>Vessel Intima (Endothelium)</title>
    <desc>Innermost tunica intima: a single layer of endothelial cells lining the lumen.</desc>
    <circle class="region-path" cx="400" cy="300" r="115" fill="#f3d0d0" stroke="#b86a6a" stroke-width="2.5"/>
    <!-- lumen -->
    <circle cx="400" cy="300" r="90" fill="#fff" stroke="#d8a8a8" stroke-width="2"/>
    <text x="400" y="304" text-anchor="middle" font-size="12" fill="#b86a6a">lumen</text>
    <!-- endothelial cells (flat, lining) -->
    <g fill="#c0504d"><circle cx="400" cy="190" r="5"/><circle cx="478" cy="222" r="5"/><circle cx="510" cy="300" r="5"/><circle cx="478" cy="378" r="5"/><circle cx="400" cy="410" r="5"/><circle cx="322" cy="378" r="5"/><circle cx="290" cy="300" r="5"/><circle cx="322" cy="222" r="5"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="vessel-adventitia" x="400" y="80" text-anchor="middle" font-size="11" fill="var(--text-secondary)">Adventitia</text>
    <text class="region-label" data-for="vessel-media" x="400" y="150" text-anchor="middle" font-size="11" fill="var(--text-secondary)">Media</text>
    <text class="region-label" data-for="vessel-intima" x="400" y="210" text-anchor="middle" font-size="11" fill="var(--text-secondary)">Intima</text>
  </g>
</svg>
