<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="blood-vessels-microanatomy-title blood-vessels-microanatomy-desc">
  <title id="blood-vessels-microanatomy-title">Blood Vessels microanatomy</title>
  <desc id="blood-vessels-microanatomy-desc">Keyboard-accessible microanatomy diagram for Blood Vessels with 3 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M400 62 C542 62 658 178 658 320 C658 462 542 538 400 538 C258 538 142 462 142 320 C142 178 258 62 400 62 Z"/>
  <g class="regions-layer">
    <g id="intima" class="microstructure-region" data-microstructure="intima" role="button" tabindex="0" aria-label="Vessel Intima (Endothelium)">
      <title>Vessel Intima (Endothelium)</title>
      <desc>The inner lining of blood vessels composed of endothelial cells.</desc>
      <path class="region-path" d="M400 214 C455 214 500 259 500 320 C500 381 455 386 400 386 C345 386 300 381 300 320 C300 259 345 214 400 214 Z" fill="#E8A0A0" fill-opacity="0.92"/>
    </g>
    <g id="media" class="microstructure-region" data-microstructure="media" role="button" tabindex="0" aria-label="Vessel Media">
      <title>Vessel Media</title>
      <desc>The middle layer of blood vessels containing smooth muscle cells.</desc>
      <path class="region-path" d="M400 132 C503 132 588 217 588 320 C588 423 503 468 400 468 C297 468 212 423 212 320 C212 217 297 132 400 132 Z M400 214 C345 214 300 259 300 320 C300 381 345 386 400 386 C455 386 500 381 500 320 C500 259 455 214 400 214 Z" fill="#E8A0A0" fill-opacity="0.82"/>
    </g>
    <g id="adventitia" class="microstructure-region" data-microstructure="adventitia" role="button" tabindex="0" aria-label="Vessel Adventitia">
      <title>Vessel Adventitia</title>
      <desc>The outer connective tissue layer of blood vessels.</desc>
      <path class="region-path" d="M400 62 C542 62 658 178 658 320 C658 462 542 538 400 538 C258 538 142 462 142 320 C142 178 258 62 400 62 Z M400 132 C297 132 212 217 212 320 C212 423 297 468 400 468 C503 468 588 423 588 320 C588 217 503 132 400 132 Z" fill="#E8A0A0" fill-opacity="0.72"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label label-small" data-for="intima" x="400" y="320" text-anchor="middle">Vessel Intima (Endothelium)</text>
    <text class="region-label" data-for="media" x="400" y="176" text-anchor="middle">Vessel Media</text>
    <text class="region-label" data-for="adventitia" x="400" y="102" text-anchor="middle">Vessel Adventitia</text>
  </g>
</svg>
