<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Large intestine microanatomy — colonic epithelium">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Colonic Epithelium</text>
  <g id="colonic-epithelium" class="microstructure-region" data-microstructure="colonic-epithelium"
     role="button" tabindex="0" aria-label="Colonic Epithelium — click to view cell types">
    <title>Colonic Epithelium</title>
    <desc>Flat luminal surface with straight tubular crypts of Lieberkuhn lined by colonocytes and goblet cells.</desc>
    <rect class="region-path" x="100" y="100" width="600" height="420" fill="#D4A574" stroke="#8a6a3f" stroke-width="2.5"/>
    <path d="M100,130 h600" stroke="#8a6a3f" stroke-width="3" opacity="0.5"/>
    <!-- straight crypts (test-tube shaped, perpendicular to surface) -->
    <g fill="#e3c39a" stroke="#9c7846" stroke-width="2">
      <rect x="150" y="135" width="34" height="330" rx="17"/>
      <rect x="244" y="135" width="34" height="330" rx="17"/>
      <rect x="338" y="135" width="34" height="330" rx="17"/>
      <rect x="432" y="135" width="34" height="330" rx="17"/>
      <rect x="526" y="135" width="34" height="330" rx="17"/>
      <rect x="620" y="135" width="34" height="330" rx="17"/>
    </g>
    <!-- goblet cells (clear mucus cells along crypt walls) -->
    <g fill="#dff0f5" stroke="#a8c4cf" stroke-width="1">
      <circle cx="150" cy="200" r="7"/><circle cx="184" cy="260" r="7"/><circle cx="150" cy="330" r="7"/>
      <circle cx="244" cy="220" r="7"/><circle cx="278" cy="290" r="7"/><circle cx="244" cy="360" r="7"/>
      <circle cx="338" cy="210" r="7"/><circle cx="372" cy="280" r="7"/><circle cx="338" cy="350" r="7"/>
      <circle cx="432" cy="225" r="7"/><circle cx="466" cy="295" r="7"/><circle cx="432" cy="360" r="7"/>
      <circle cx="526" cy="210" r="7"/><circle cx="560" cy="280" r="7"/><circle cx="526" cy="350" r="7"/>
      <circle cx="620" cy="220" r="7"/><circle cx="654" cy="290" r="7"/><circle cx="620" cy="360" r="7"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="colonic-epithelium" x="400" y="555" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Colonic Epithelium — straight crypts, colonocytes + goblet cells</text>
  </g>
</svg>
