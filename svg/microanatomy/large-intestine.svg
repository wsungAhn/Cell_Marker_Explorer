<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="large-intestine-microanatomy-title large-intestine-microanatomy-desc">
  <title id="large-intestine-microanatomy-title">Large Intestine (Colon) microanatomy</title>
  <desc id="large-intestine-microanatomy-desc">Keyboard-accessible microanatomy diagram for Large Intestine (Colon) with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M164 108 H636 C680 108 716 144 716 188 V414 C716 458 680 494 636 494 H164 C120 494 84 458 84 414 V188 C84 144 120 108 164 108 Z"/>
  <g class="regions-layer">
    <g id="colonic-epithelium" class="microstructure-region" data-microstructure="colonic-epithelium" role="button" tabindex="0" aria-label="Colonic Epithelium">
      <title>Colonic Epithelium</title>
      <desc>The lining of the colon composed of absorptive and secretory cells.</desc>
      <path class="region-path" d="M164 108 H636 C680 108 716 144 716 188 V414 C716 458 680 494 636 494 H164 C120 494 84 458 84 414 V188 C84 144 120 108 164 108 Z" fill="#D4A574" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M164 174 H636 M164 250 H636 M164 326 H636 M164 402 H636 M226 142 V462 M318 142 V462 M410 142 V462 M502 142 V462 M594 142 V462"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="colonic-epithelium" x="400" y="310" text-anchor="middle">Colonic Epithelium</text>
  </g>
</svg>
