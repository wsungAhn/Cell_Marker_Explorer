<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="ovary-microanatomy-title ovary-microanatomy-desc">
  <title id="ovary-microanatomy-title">Ovary microanatomy</title>
  <desc id="ovary-microanatomy-desc">Keyboard-accessible microanatomy diagram for Ovary with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M400 74 C555 74 680 190 680 322 C680 470 555 536 400 536 C245 536 120 470 120 322 C120 190 245 74 400 74 Z"/>
  <g class="regions-layer">
    <g id="follicle" class="microstructure-region" data-microstructure="follicle" role="button" tabindex="0" aria-label="Ovarian Follicle">
      <title>Ovarian Follicle</title>
      <desc>Structures containing an oocyte surrounded by granulosa and theca cells.</desc>
      <path class="region-path" d="M400 74 C555 74 680 190 680 322 C680 470 555 536 400 536 C245 536 120 470 120 322 C120 190 245 74 400 74 Z" fill="#F0C8D8" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <circle class="detail-line" cx="400" cy="302" r="122"/>
    <circle class="detail-line" cx="400" cy="302" r="58"/>
    <circle class="detail-line" cx="400" cy="302" r="18"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="follicle" x="400" y="238" text-anchor="middle">Ovarian Follicle</text>
  </g>
</svg>
