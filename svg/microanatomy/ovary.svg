<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Ovary microanatomy — ovarian follicle">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Ovarian Follicle</text>
  <g id="ovarian-follicle" class="microstructure-region" data-microstructure="ovarian-follicle"
     role="button" tabindex="0" aria-label="Ovarian Follicle — click to view cell types">
    <title>Ovarian Follicle</title>
    <desc>Maturing follicle: a central oocyte ringed by granulosa cells with a fluid-filled antrum, set in ovarian stroma.</desc>
    <ellipse class="region-path" cx="400" cy="300" rx="270" ry="200" fill="#F0C8D8" stroke="#b87a98" stroke-width="2.5"/>
    <!-- antrum (fluid cavity) -->
    <circle cx="400" cy="300" r="160" fill="#fbe6ef" stroke="#d8a8c0" stroke-width="2"/>
    <!-- granulosa cell ring -->
    <circle cx="400" cy="300" r="160" fill="none" stroke="#d88ab0" stroke-width="20" opacity="0.6"/>
    <!-- cumulus oophorus + oocyte -->
    <circle cx="400" cy="300" r="62" fill="#f5c0d8" stroke="#c97a9c" stroke-width="2"/>
    <circle cx="400" cy="300" r="36" fill="#e89 abc" stroke="#b86a8c" stroke-width="2"/>
    <circle cx="400" cy="300" r="36" fill="#e89abc" stroke="#b86a8c" stroke-width="2"/>
    <circle cx="400" cy="300" r="15" fill="#a05a7a"/>
    <text x="400" y="304" text-anchor="middle" font-size="9" fill="#fff">oocyte</text>
    <!-- granulosa cells (dots on ring) -->
    <g fill="#c2729a">
      <circle cx="400" cy="140" r="6"/><circle cx="513" cy="187" r="6"/><circle cx="560" cy="300" r="6"/><circle cx="513" cy="413" r="6"/><circle cx="400" cy="460" r="6"/><circle cx="287" cy="413" r="6"/><circle cx="240" cy="300" r="6"/><circle cx="287" cy="187" r="6"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="ovarian-follicle" x="400" y="555" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Ovarian Follicle — oocyte + granulosa cells + antrum</text>
  </g>
</svg>
