<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Eye microanatomy — retina">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Retina (Layers)</text>
  <g id="retina" class="microstructure-region" data-microstructure="retina"
     role="button" tabindex="0" aria-label="Retina — click to view cell types">
    <title>Retina</title>
    <desc>Layered neural retina: photoreceptors, bipolar interneurons, and ganglion cells from outer to inner surface.</desc>
    <rect class="region-path" x="120" y="90" width="560" height="420" fill="#C8E8D8" stroke="#6aa888" stroke-width="2.5"/>
    <!-- photoreceptor layer (rods/cones, outer) -->
    <g fill="#9bbb59">
      <rect x="140" y="100" width="8" height="60" rx="4"/><rect x="160" y="100" width="8" height="60" rx="4"/><rect x="180" y="100" width="8" height="60" rx="4"/><rect x="200" y="100" width="8" height="60" rx="4"/><rect x="220" y="100" width="8" height="60" rx="4"/><rect x="240" y="100" width="8" height="60" rx="4"/><rect x="260" y="100" width="8" height="60" rx="4"/><rect x="280" y="100" width="8" height="60" rx="4"/><rect x="300" y="100" width="8" height="60" rx="4"/><rect x="320" y="100" width="8" height="60" rx="4"/><rect x="340" y="100" width="8" height="60" rx="4"/><rect x="360" y="100" width="8" height="60" rx="4"/><rect x="380" y="100" width="8" height="60" rx="4"/><rect x="400" y="100" width="8" height="60" rx="4"/><rect x="420" y="100" width="8" height="60" rx="4"/><rect x="440" y="100" width="8" height="60" rx="4"/><rect x="460" y="100" width="8" height="60" rx="4"/><rect x="480" y="100" width="8" height="60" rx="4"/><rect x="500" y="100" width="8" height="60" rx="4"/><rect x="520" y="100" width="8" height="60" rx="4"/><rect x="540" y="100" width="8" height="60" rx="4"/><rect x="560" y="100" width="8" height="60" rx="4"/><rect x="580" y="100" width="8" height="60" rx="4"/><rect x="600" y="100" width="8" height="60" rx="4"/><rect x="620" y="100" width="8" height="60" rx="4"/><rect x="640" y="100" width="8" height="60" rx="4"/>
    </g>
    <text x="690" y="135" font-size="10" fill="#5a8a6a">photoreceptors</text>
    <!-- outer nuclear layer -->
    <g fill="#8abf9a"><circle cx="160" cy="200" r="9"/><circle cx="240" cy="200" r="9"/><circle cx="320" cy="200" r="9"/><circle cx="400" cy="200" r="9"/><circle cx="480" cy="200" r="9"/><circle cx="560" cy="200" r="9"/><circle cx="640" cy="200" r="9"/></g>
    <!-- bipolar (inner nuclear) layer -->
    <g fill="#6aa888"><circle cx="200" cy="310" r="9"/><circle cx="300" cy="310" r="9"/><circle cx="400" cy="310" r="9"/><circle cx="500" cy="310" r="9"/><circle cx="600" cy="310" r="9"/></g>
    <text x="690" y="315" font-size="10" fill="#5a8a6a">bipolar</text>
    <!-- ganglion cell layer (inner) -->
    <g fill="#4a8a68"><circle cx="220" cy="430" r="12"/><circle cx="340" cy="430" r="12"/><circle cx="460" cy="430" r="12"/><circle cx="580" cy="430" r="12"/></g>
    <text x="690" y="435" font-size="10" fill="#5a8a6a">ganglion</text>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="retina" x="400" y="545" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Retina — photoreceptor → bipolar → ganglion cell layers</text>
  </g>
</svg>
