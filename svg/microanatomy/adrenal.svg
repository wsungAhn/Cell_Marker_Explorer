<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Adrenal microanatomy — cortex and medulla">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Adrenal Cortex &amp; Medulla</text>

  <!-- Cortex: outer zonated band -->
  <g id="adrenal-cortex" class="microstructure-region" data-microstructure="adrenal-cortex"
     role="button" tabindex="0" aria-label="Adrenal Cortex — click to view cell types">
    <title>Adrenal Cortex</title>
    <desc>Outer zonated cortex (glomerulosa, fasciculata, reticularis) producing steroid hormones.</desc>
    <ellipse class="region-path" cx="400" cy="300" rx="290" ry="215" fill="#E0C8E8" stroke="#9a7aa8" stroke-width="2.5"/>
    <!-- three zones (concentric bands) -->
    <g fill="none" stroke="#b89ad0" stroke-width="2" opacity="0.6">
      <ellipse cx="400" cy="300" rx="270" ry="198"/>
      <ellipse cx="400" cy="300" rx="225" ry="165"/>
    </g>
    <text x="400" y="115" text-anchor="middle" font-size="10" fill="#8a6aa8">zona glomerulosa</text>
    <text x="400" y="160" text-anchor="middle" font-size="10" fill="#8a6aa8">zona fasciculata</text>
    <!-- cortical cells (radial cords) -->
    <g stroke="#c0a0d0" stroke-width="3" opacity="0.5">
      <line x1="400" y1="105" x2="400" y2="160"/><line x1="540" y1="150" x2="510" y2="195"/><line x1="620" y1="260" x2="565" y2="280"/><line x1="260" y1="150" x2="290" y2="195"/><line x1="180" y1="260" x2="235" y2="280"/>
    </g>
  </g>

  <!-- Medulla: inner chromaffin core -->
  <g id="adrenal-medulla" class="microstructure-region" data-microstructure="adrenal-medulla"
     role="button" tabindex="0" aria-label="Adrenal Medulla — click to view cell types">
    <title>Adrenal Medulla</title>
    <desc>Inner chromaffin core: modified neuroendocrine cells secreting epinephrine and norepinephrine.</desc>
    <ellipse class="region-path" cx="400" cy="320" rx="150" ry="120" fill="#d8b8e8" stroke="#9a7aa8" stroke-width="2.5"/>
    <!-- chromaffin cells -->
    <g fill="#a06ac0"><circle cx="360" cy="300" r="8"/><circle cx="410" cy="285" r="8"/><circle cx="450" cy="310" r="8"/><circle cx="380" cy="345" r="8"/><circle cx="430" cy="350" r="8"/><circle cx="340" cy="330" r="8"/><circle cx="470" cy="345" r="8"/></g>
    <!-- central vein -->
    <circle cx="400" cy="320" r="16" fill="#c0504d" stroke="#8a3838" stroke-width="2"/>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="adrenal-cortex" x="400" y="500" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Cortex (zonated)</text>
    <text class="region-label" data-for="adrenal-medulla" x="400" y="320" text-anchor="middle" font-size="11" fill="#8a6aa8">Medulla</text>
  </g>
</svg>
