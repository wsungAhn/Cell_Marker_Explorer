<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="adrenal-microanatomy-title adrenal-microanatomy-desc">
  <title id="adrenal-microanatomy-title">Adrenal Gland microanatomy</title>
  <desc id="adrenal-microanatomy-desc">Keyboard-accessible microanatomy diagram for Adrenal Gland with 2 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M123 365 C159 182 288 80 400 80 C512 80 641 182 677 365 C698 474 576 528 400 528 C224 528 102 474 123 365 Z"/>
  <g class="regions-layer">
    <g id="adrenal-cortex" class="microstructure-region" data-microstructure="adrenal-cortex" role="button" tabindex="0" aria-label="Adrenal Cortex">
      <title>Adrenal Cortex</title>
      <desc>The outer layer producing steroid hormones (cortisol, aldosterone).</desc>
      <path class="region-path" d="M123 365 C159 182 288 80 400 80 C512 80 641 182 677 365 C698 474 576 528 400 528 C224 528 102 474 123 365 Z M215 360 C240 236 325 164 400 164 C475 164 560 236 585 360 C597 424 520 454 400 454 C280 454 203 424 215 360 Z" fill="#E0C8E8" fill-opacity="0.92"/>
    </g>
    <g id="adrenal-medulla" class="microstructure-region" data-microstructure="adrenal-medulla" role="button" tabindex="0" aria-label="Adrenal Medulla">
      <title>Adrenal Medulla</title>
      <desc>The inner layer producing catecholamines (adrenaline, noradrenaline).</desc>
      <path class="region-path" d="M215 360 C240 236 325 164 400 164 C475 164 560 236 585 360 C597 424 520 454 400 454 C280 454 203 424 215 360 Z" fill="#E0C8E8" fill-opacity="0.82"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="adrenal-cortex" x="400" y="146" text-anchor="middle">Adrenal Cortex</text>
    <text class="region-label" data-for="adrenal-medulla" x="400" y="343" text-anchor="middle">Adrenal Medulla</text>
  </g>
</svg>
