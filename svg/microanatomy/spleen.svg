<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="spleen-microanatomy-title spleen-microanatomy-desc">
  <title id="spleen-microanatomy-title">Spleen microanatomy</title>
  <desc id="spleen-microanatomy-desc">Keyboard-accessible microanatomy diagram for Spleen with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M301 79 C433 35 598 115 652 243 C717 397 601 525 430 529 C271 533 162 448 143 317 C121 168 188 116 301 79 Z"/>
  <g class="regions-layer">
    <g id="white-pulp" class="microstructure-region" data-microstructure="white-pulp" role="button" tabindex="0" aria-label="White Pulp">
      <title>White Pulp</title>
      <desc>Lymphoid tissue of the spleen containing T and B cell zones.</desc>
      <path class="region-path" d="M301 79 C433 35 598 115 652 243 C717 397 601 525 430 529 C271 533 162 448 143 317 C121 168 188 116 301 79 Z" fill="#C8D5E0" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M249 194 C352 130 514 174 579 276 C516 247 437 269 393 340 C340 300 280 292 218 326"/>
    <circle class="detail-line" cx="431" cy="294" r="70"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="white-pulp" x="400" y="312" text-anchor="middle">White Pulp</text>
  </g>
</svg>
