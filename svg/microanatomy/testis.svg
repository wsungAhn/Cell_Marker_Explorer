<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="testis-microanatomy-title testis-microanatomy-desc">
  <title id="testis-microanatomy-title">Testis microanatomy</title>
  <desc id="testis-microanatomy-desc">Keyboard-accessible microanatomy diagram for Testis with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M400 62 C558 62 686 196 686 340 C686 494 558 542 400 542 C242 542 114 494 114 340 C114 196 242 62 400 62 Z"/>
  <g class="regions-layer">
    <g id="seminiferous-tubule" class="microstructure-region" data-microstructure="seminiferous-tubule" role="button" tabindex="0" aria-label="Seminiferous Tubule">
      <title>Seminiferous Tubule</title>
      <desc>Coiled tubes in the testis where spermatogenesis occurs.</desc>
      <path class="region-path" d="M400 62 C558 62 686 196 686 340 C686 494 558 542 400 542 C242 542 114 494 114 340 C114 196 242 62 400 62 Z" fill="#F0C8D8" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M234 240 C306 168 476 168 562 246 C641 318 566 438 430 420 C294 402 212 332 282 278 C339 235 470 238 506 294 C544 353 470 386 386 366 C318 349 300 300 348 279"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="seminiferous-tubule" x="400" y="304" text-anchor="middle">Seminiferous Tubule</text>
  </g>
</svg>
