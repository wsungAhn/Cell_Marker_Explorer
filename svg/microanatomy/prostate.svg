<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="prostate-microanatomy-title prostate-microanatomy-desc">
  <title id="prostate-microanatomy-title">Prostate microanatomy</title>
  <desc id="prostate-microanatomy-desc">Keyboard-accessible microanatomy diagram for Prostate with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M400 93 C547 93 667 196 667 326 C667 474 548 532 400 532 C252 532 133 474 133 326 C133 196 253 93 400 93 Z"/>
  <g class="regions-layer">
    <g id="prostate-epithelium" class="microstructure-region" data-microstructure="prostate-epithelium" role="button" tabindex="0" aria-label="Prostate Epithelium">
      <title>Prostate Epithelium</title>
      <desc>The glandular epithelium of the prostate.</desc>
      <path class="region-path" d="M400 93 C547 93 667 196 667 326 C667 474 548 532 400 532 C252 532 133 474 133 326 C133 196 253 93 400 93 Z" fill="#F0C8D8" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M260 262 C342 202 460 202 540 262 M234 348 C326 412 478 412 566 348 M322 214 C294 306 316 396 400 460 M478 214 C506 306 484 396 400 460"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="prostate-epithelium" x="400" y="326" text-anchor="middle">Prostate Epithelium</text>
  </g>
</svg>
