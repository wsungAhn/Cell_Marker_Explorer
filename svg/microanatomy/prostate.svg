<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Prostate microanatomy — prostate epithelium">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Prostate Epithelium</text>
  <g id="prostate-epithelium" class="microstructure-region" data-microstructure="prostate-epithelium"
     role="button" tabindex="0" aria-label="Prostate Epithelium — click to view cell types">
    <title>Prostate Epithelium</title>
    <desc>Glandular acini lined by secretory luminal and basal epithelium, separated by fibromuscular stroma.</desc>
    <rect class="region-path" x="100" y="80" width="600" height="440" rx="14" fill="#F0C8D8" stroke="#b87a98" stroke-width="2.5" opacity="0.4"/>
    <!-- glandular acini (irregular folded lumina) -->
    <g>
      <path d="M180,180 q60,-40 120,0 q40,60 0,120 q-60,40 -120,0 q-40,-60 0,-120 z" fill="#fbe6ef" stroke="#c97a9c" stroke-width="8"/>
      <path d="M460,160 q70,-30 130,20 q30,70 -20,130 q-70,30 -130,-20 q-30,-70 20,-130 z" fill="#fbe6ef" stroke="#c97a9c" stroke-width="8"/>
      <path d="M300,360 q60,-30 120,10 q35,60 -10,115 q-60,35 -120,-10 q-35,-60 10,-115 z" fill="#fbe6ef" stroke="#c97a9c" stroke-width="8"/>
    </g>
    <!-- luminal secretory cells (lining, pink) + basal cells (darker) -->
    <g fill="#d88ab0"><circle cx="180" cy="240" r="6"/><circle cx="300" cy="240" r="6"/><circle cx="240" cy="180" r="6"/><circle cx="240" cy="300" r="6"/></g>
    <g fill="#a05a7a"><circle cx="240" cy="240" r="4"/><circle cx="525" cy="225" r="4"/><circle cx="360" cy="420" r="4"/></g>
    <!-- corpora amylacea (luminal concretions) -->
    <circle cx="240" cy="240" r="14" fill="#e8d3a0" opacity="0.7"/>
    <circle cx="525" cy="225" r="16" fill="#e8d3a0" opacity="0.7"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="prostate-epithelium" x="400" y="555" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Prostate Epithelium — glandular acini (luminal + basal cells)</text>
  </g>
</svg>
