<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Bone marrow microanatomy — hematopoietic niche">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Hematopoietic Niche</text>
  <g id="hematopoietic-niche" class="microstructure-region" data-microstructure="hematopoietic-niche"
     role="button" tabindex="0" aria-label="Hematopoietic Niche — click to view cell types">
    <title>Hematopoietic Niche</title>
    <desc>Marrow cavity within trabecular bone: sinusoids and stromal niche supporting hematopoietic stem cells and developing blood cells.</desc>
    <!-- trabecular bone border -->
    <rect x="100" y="80" width="600" height="440" rx="20" fill="#ece3d2" stroke="#b8a888" stroke-width="3"/>
    <!-- marrow cavity (clickable) -->
    <rect class="region-path" x="140" y="118" width="520" height="364" rx="14" fill="#C8D5E0" stroke="#7a93a8" stroke-width="2" opacity="0.5"/>
    <!-- sinusoid (red vascular channel) -->
    <path d="M150,220 q200,-40 520,30" fill="none" stroke="#c0504d" stroke-width="16" opacity="0.5"/>
    <path d="M150,380 q260,50 520,-20" fill="none" stroke="#c0504d" stroke-width="14" opacity="0.5"/>
    <!-- mixed hematopoietic cells (varied sizes/colors) -->
    <g>
      <circle cx="200" cy="180" r="12" fill="#e79a9a"/><circle cx="260" cy="160" r="9" fill="#8fa6bd"/><circle cx="320" cy="185" r="14" fill="#cbb56a"/>
      <circle cx="390" cy="165" r="10" fill="#9bbb59"/><circle cx="450" cy="190" r="12" fill="#e79a9a"/><circle cx="520" cy="170" r="9" fill="#8fa6bd"/><circle cx="590" cy="195" r="11" fill="#cbb56a"/>
      <circle cx="230" cy="280" r="11" fill="#9bbb59"/><circle cx="300" cy="300" r="14" fill="#e79a9a"/><circle cx="380" cy="285" r="9" fill="#8fa6bd"/><circle cx="460" cy="305" r="12" fill="#cbb56a"/><circle cx="540" cy="290" r="10" fill="#9bbb59"/>
      <circle cx="210" cy="420" r="10" fill="#8fa6bd"/><circle cx="290" cy="440" r="13" fill="#e79a9a"/><circle cx="380" cy="425" r="9" fill="#cbb56a"/><circle cx="470" cy="445" r="11" fill="#9bbb59"/><circle cx="560" cy="425" r="12" fill="#e79a9a"/>
      <!-- megakaryocyte (large) -->
      <circle cx="400" cy="360" r="26" fill="#b89ad0" stroke="#8a6aa8" stroke-width="2"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="hematopoietic-niche" x="400" y="545" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Hematopoietic Niche — sinusoids + mixed blood-forming cells</text>
  </g>
</svg>
