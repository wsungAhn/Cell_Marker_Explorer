<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Blood microanatomy — circulating leukocytes">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Blood Leukocytes (Smear)</text>
  <!-- generous clickable field: hosts 37 cell types -->
  <g id="blood-leukocytes" class="microstructure-region" data-microstructure="blood-leukocytes"
     role="button" tabindex="0" aria-label="Blood Leukocytes — click to view cell types">
    <title>Blood Leukocytes</title>
    <desc>A blood smear field of circulating white blood cells (lymphocytes, monocytes, granulocytes, NK and dendritic cells) among red cells and platelets.</desc>
    <rect class="region-path" x="80" y="70" width="640" height="460" rx="16" fill="#C8D5E0" stroke="#7a93a8" stroke-width="2.5" opacity="0.4"/>
    <!-- red blood cells (biconcave, pale ring) -->
    <g fill="#e79a9a" opacity="0.8">
      <circle cx="150" cy="140" r="18"/><circle cx="250" cy="180" r="18"/><circle cx="360" cy="130" r="18"/><circle cx="470" cy="170" r="18"/><circle cx="580" cy="140" r="18"/><circle cx="650" cy="200" r="18"/>
      <circle cx="180" cy="280" r="18"/><circle cx="300" cy="320" r="18"/><circle cx="520" cy="300" r="18"/><circle cx="620" cy="350" r="18"/>
      <circle cx="160" cy="420" r="18"/><circle cx="280" cy="450" r="18"/><circle cx="430" cy="430" r="18"/><circle cx="560" cy="460" r="18"/>
    </g>
    <g fill="#f0c0c0"><circle cx="150" cy="140" r="8"/><circle cx="250" cy="180" r="8"/><circle cx="360" cy="130" r="8"/><circle cx="470" cy="170" r="8"/><circle cx="580" cy="140" r="8"/><circle cx="180" cy="280" r="8"/><circle cx="300" cy="320" r="8"/><circle cx="520" cy="300" r="8"/><circle cx="160" cy="420" r="8"/><circle cx="280" cy="450" r="8"/><circle cx="430" cy="430" r="8"/><circle cx="560" cy="460" r="8"/></g>
    <!-- leukocytes (varied nuclei) -->
    <!-- lymphocyte (large round nucleus) -->
    <g transform="translate(220,240)"><circle r="24" fill="#cdbce8" stroke="#9a7aa8" stroke-width="2"/><circle r="17" fill="#6a4a8a"/></g>
    <!-- monocyte (kidney nucleus) -->
    <g transform="translate(400,260)"><circle r="28" fill="#bcd0e8" stroke="#7a93a8" stroke-width="2"/><path d="M-12,-8 a16,16 0 1,0 0,16 a10,10 0 1,1 0,-16 z" fill="#3a5a8a"/></g>
    <!-- neutrophil (multilobed) -->
    <g transform="translate(330,400)"><circle r="24" fill="#dfeacf" stroke="#9bbb59" stroke-width="2"/><g fill="#5a7a2a"><circle cx="-8" cy="-6" r="6"/><circle cx="8" cy="-6" r="6"/><circle cx="0" cy="8" r="6"/></g></g>
    <!-- eosinophil (bilobed, granules) -->
    <g transform="translate(540,210)"><circle r="22" fill="#f0d0b0" stroke="#d08a4a" stroke-width="2"/><g fill="#a0502a"><circle cx="-7" cy="0" r="6"/><circle cx="7" cy="0" r="6"/></g></g>
    <!-- NK / dendritic accents -->
    <g transform="translate(480,400)"><circle r="20" fill="#cde8d8" stroke="#6aa888" stroke-width="2"/><circle r="13" fill="#4a8a68"/></g>
    <!-- platelets -->
    <g fill="#b89ad0"><circle cx="340" cy="200" r="5"/><circle cx="600" cy="280" r="5"/><circle cx="240" cy="380" r="5"/></g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="blood-leukocytes" x="400" y="560" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Blood Leukocytes — lymphocyte, monocyte, neutrophil, eosinophil, NK among RBCs</text>
  </g>
</svg>
