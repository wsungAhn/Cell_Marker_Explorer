<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="blood-microanatomy-title blood-microanatomy-desc">
  <title id="blood-microanatomy-title">Blood microanatomy</title>
  <desc id="blood-microanatomy-desc">Keyboard-accessible microanatomy diagram for Blood with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M96 112 H704 C737 112 764 139 764 172 V428 C764 461 737 488 704 488 H96 C63 488 36 461 36 428 V172 C36 139 63 112 96 112 Z"/>
  <g class="regions-layer">
    <g id="blood-leukocytes" class="microstructure-region" data-microstructure="blood-leukocytes" role="button" tabindex="0" aria-label="Blood Leukocytes">
      <title>Blood Leukocytes</title>
      <desc>White blood cells involved in immune defense.</desc>
      <path class="region-path" d="M96 112 H704 C737 112 764 139 764 172 V428 C764 461 737 488 704 488 H96 C63 488 36 461 36 428 V172 C36 139 63 112 96 112 Z" fill="#C8D5E0" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <circle class="detail-line" cx="142" cy="194" r="21"/>
    <circle class="detail-line" cx="224" cy="276" r="25"/>
    <circle class="detail-line" cx="324" cy="202" r="18"/>
    <circle class="detail-line" cx="432" cy="322" r="27"/>
    <circle class="detail-line" cx="558" cy="226" r="20"/>
    <circle class="detail-line" cx="646" cy="356" r="24"/>
    <circle class="detail-line" cx="176" cy="386" r="18"/>
    <circle class="detail-line" cx="306" cy="414" r="20"/>
    <circle class="detail-line" cx="520" cy="418" r="17"/>
    <circle class="detail-line" cx="660" cy="174" r="16"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="blood-leukocytes" x="400" y="300" text-anchor="middle">Blood Leukocytes</text>
  </g>
</svg>
