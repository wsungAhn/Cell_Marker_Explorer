<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Thyroid microanatomy — thyroid follicle">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Thyroid Follicle</text>
  <g id="thyroid-follicle" class="microstructure-region" data-microstructure="thyroid-follicle"
     role="button" tabindex="0" aria-label="Thyroid Follicle — click to view cell types">
    <title>Thyroid Follicle</title>
    <desc>Colloid-filled spheres ringed by a single layer of follicular (thyrocyte) cells, with parafollicular C cells between follicles.</desc>
    <rect class="region-path" x="100" y="80" width="600" height="440" rx="14" fill="#E0C8E8" stroke="#9a7aa8" stroke-width="2.5" opacity="0.35"/>
    <!-- follicles: colloid spheres ringed by cuboidal thyrocytes -->
    <g>
      <!-- follicle 1 -->
      <circle cx="260" cy="220" r="90" fill="#f0e2b0" stroke="#b9a35a" stroke-width="3"/>
      <circle cx="260" cy="220" r="90" fill="none" stroke="#9a7aa8" stroke-width="14" stroke-dasharray="9 7" opacity="0.8"/>
      <text x="260" y="225" text-anchor="middle" font-size="11" fill="#8a7a3a">colloid</text>
      <!-- follicle 2 -->
      <circle cx="520" cy="260" r="110" fill="#f0e2b0" stroke="#b9a35a" stroke-width="3"/>
      <circle cx="520" cy="260" r="110" fill="none" stroke="#9a7aa8" stroke-width="14" stroke-dasharray="9 7" opacity="0.8"/>
      <text x="520" y="265" text-anchor="middle" font-size="11" fill="#8a7a3a">colloid</text>
      <!-- follicle 3 -->
      <circle cx="330" cy="410" r="80" fill="#f0e2b0" stroke="#b9a35a" stroke-width="3"/>
      <circle cx="330" cy="410" r="80" fill="none" stroke="#9a7aa8" stroke-width="13" stroke-dasharray="9 7" opacity="0.8"/>
    </g>
    <!-- parafollicular C cells (between follicles) -->
    <g fill="#b06ab0">
      <circle cx="400" cy="150" r="8"/><circle cx="430" cy="430" r="8"/><circle cx="180" cy="350" r="8"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="thyroid-follicle" x="400" y="555" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Thyroid Follicles — colloid ringed by thyrocytes (+ C cells, purple)</text>
  </g>
</svg>
