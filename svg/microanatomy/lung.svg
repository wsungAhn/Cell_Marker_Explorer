<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Lung microanatomy — alveoli and bronchi">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Lung (Alveoli &amp; Bronchi)</text>

  <!-- Bronchi: branching airway (left) -->
  <g id="bronchi" class="microstructure-region" data-microstructure="bronchi"
     role="button" tabindex="0" aria-label="Bronchi — click to view cell types">
    <title>Bronchi</title>
    <desc>Branching conducting airway lined by ciliated pseudostratified epithelium with neuroendocrine cells.</desc>
    <path class="region-path" d="M120,120 q60,80 60,180 q0,120 -10,180 l60,0 q10,-60 10,-180 q0,-100 50,-160 l-40,-40 q-50,50 -60,120 q-10,-70 -70,-120 z"
      fill="#D5E8F0" stroke="#6a93a8" stroke-width="2.5"/>
    <!-- epithelial lining (cilia dots) -->
    <g fill="#8ab8cf"><circle cx="160" cy="200" r="5"/><circle cx="168" cy="260" r="5"/><circle cx="170" cy="330" r="5"/><circle cx="165" cy="400" r="5"/></g>
  </g>

  <!-- Alveoli: grape-like air sacs (right) -->
  <g id="alveoli" class="microstructure-region" data-microstructure="alveoli"
     role="button" tabindex="0" aria-label="Alveoli — click to view cell types">
    <title>Alveoli</title>
    <desc>Cluster of thin-walled air sacs for gas exchange: type I and type II pneumocytes with alveolar macrophages.</desc>
    <!-- a generous bounding region for clicks -->
    <rect class="region-path" x="360" y="110" width="330" height="420" rx="20" fill="#D5E8F0" stroke="#6a93a8" stroke-width="2" opacity="0.35"/>
    <!-- alveolar sacs -->
    <g fill="#eaf5fa" stroke="#7aa8bf" stroke-width="2.5">
      <circle cx="440" cy="190" r="46"/><circle cx="540" cy="170" r="52"/><circle cx="630" cy="210" r="44"/>
      <circle cx="420" cy="300" r="50"/><circle cx="530" cy="290" r="56"/><circle cx="640" cy="320" r="46"/>
      <circle cx="450" cy="420" r="48"/><circle cx="560" cy="410" r="52"/><circle cx="650" cy="440" r="42"/>
    </g>
    <!-- type II pneumocytes (corner cuboidal) + macrophage -->
    <g fill="#6a93a8"><circle cx="480" cy="230" r="5"/><circle cx="588" cy="218" r="5"/><circle cx="470" cy="345" r="5"/><circle cx="590" cy="340" r="5"/></g>
    <circle cx="530" cy="300" r="11" fill="#c98a8a" stroke="#a05a5a" stroke-width="1.5"/>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="bronchi" x="120" y="540" font-size="12" fill="var(--text-secondary)">Bronchi</text>
    <text class="region-label" data-for="alveoli" x="560" y="540" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Alveoli</text>
  </g>
</svg>
