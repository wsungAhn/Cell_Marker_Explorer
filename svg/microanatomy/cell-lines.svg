<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Cell lines — cultured cells">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Cultured Cell Lines</text>
  <g id="cell-lines-misc" class="microstructure-region" data-microstructure="cell-lines-misc"
     role="button" tabindex="0" aria-label="Miscellaneous Cell Lines — click to view cell types">
    <title>Miscellaneous Cell Lines</title>
    <desc>Abstract culture-dish motif representing established and stem-cell lines grown in vitro (e.g. iPSC, ESC, cancer lines).</desc>
    <!-- culture dish -->
    <ellipse class="region-path" cx="400" cy="310" rx="280" ry="210" fill="#dfe7ec" stroke="#7a93a8" stroke-width="4"/>
    <ellipse cx="400" cy="300" rx="250" ry="185" fill="#eef3f6" stroke="#a8c0d0" stroke-width="2"/>
    <!-- adherent cultured cells (polygonal colonies) -->
    <g fill="#bcd0e8" stroke="#7a93a8" stroke-width="1.5">
      <polygon points="300,230 340,220 360,250 335,280 295,270"/>
      <polygon points="430,210 475,215 485,250 455,275 420,255"/>
      <polygon points="520,270 560,260 575,295 545,320 510,300"/>
      <polygon points="250,330 295,325 305,360 270,385 235,360"/>
      <polygon points="380,330 425,328 440,365 405,392 368,365"/>
      <polygon points="490,360 535,358 548,392 512,415 478,388"/>
      <polygon points="320,400 360,395 375,425 345,450 308,428"/>
    </g>
    <!-- nuclei -->
    <g fill="#5a6ba0"><circle cx="328" cy="252" r="6"/><circle cx="452" cy="244" r="6"/><circle cx="542" cy="292" r="6"/><circle cx="270" cy="356" r="6"/><circle cx="404" cy="360" r="6"/><circle cx="512" cy="388" r="6"/><circle cx="342" cy="424" r="6"/></g>
    <!-- iPSC/stem colony (tight round cluster) -->
    <g transform="translate(560,200)"><circle r="30" fill="#cde8d8" stroke="#6aa888" stroke-width="2"/><g fill="#4a8a68"><circle cx="-8" cy="-6" r="5"/><circle cx="8" cy="-6" r="5"/><circle cx="0" cy="6" r="5"/><circle cx="-10" cy="8" r="5"/><circle cx="10" cy="8" r="5"/></g></g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="cell-lines-misc" x="400" y="560" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Cultured Cell Lines — adherent colonies + stem-cell cluster (in vitro)</text>
  </g>
</svg>
