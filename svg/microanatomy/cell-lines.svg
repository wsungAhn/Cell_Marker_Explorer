<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="cell-lines-microanatomy-title cell-lines-microanatomy-desc">
  <title id="cell-lines-microanatomy-title">Cell Lines / Other microanatomy</title>
  <desc id="cell-lines-microanatomy-desc">Keyboard-accessible microanatomy diagram for Cell Lines / Other with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M194 98 H606 C637 98 662 123 662 154 V446 C662 477 637 502 606 502 H194 C163 502 138 477 138 446 V154 C138 123 163 98 194 98 Z"/>
  <g class="regions-layer">
    <g id="cell-lines" class="microstructure-region" data-microstructure="cell-lines" role="button" tabindex="0" aria-label="Miscellaneous Cell Lines">
      <title>Miscellaneous Cell Lines</title>
      <desc>Cell lines and other cell types.</desc>
      <path class="region-path" d="M194 98 H606 C637 98 662 123 662 154 V446 C662 477 637 502 606 502 H194 C163 502 138 477 138 446 V154 C138 123 163 98 194 98 Z" fill="#C8D5E0" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M235 168 H565 V396 H235 Z M284 224 H516 M284 285 H516 M284 346 H516"/>
    <circle class="detail-line" cx="332" cy="254" r="24"/>
    <circle class="detail-line" cx="470" cy="324" r="30"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="cell-lines" x="400" y="302" text-anchor="middle">Miscellaneous Cell Lines</text>
  </g>
</svg>
