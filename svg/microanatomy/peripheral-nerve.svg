<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="peripheral-nerve-microanatomy-title peripheral-nerve-microanatomy-desc">
  <title id="peripheral-nerve-microanatomy-title">Peripheral Nerves microanatomy</title>
  <desc id="peripheral-nerve-microanatomy-desc">Keyboard-accessible microanatomy diagram for Peripheral Nerves with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M96 242 C204 124 330 147 446 212 C546 268 632 283 712 222 L740 302 C644 393 522 378 404 310 C300 250 198 229 112 334 Z"/>
  <g class="regions-layer">
    <g id="nerve-sheath" class="microstructure-region" data-microstructure="nerve-sheath" role="button" tabindex="0" aria-label="Nerve Sheath">
      <title>Nerve Sheath</title>
      <desc>Connective tissue and glial cell layers surrounding peripheral nerve fibers.</desc>
      <path class="region-path" d="M96 242 C204 124 330 147 446 212 C546 268 632 283 712 222 L740 302 C644 393 522 378 404 310 C300 250 198 229 112 334 Z" fill="#F5E6A3" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M153 282 C246 197 350 215 462 276 C550 324 628 331 704 284 M139 316 C246 231 344 252 450 310 C540 360 614 366 684 326 M192 252 C264 242 331 262 407 304"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="nerve-sheath" x="400" y="312" text-anchor="middle">Nerve Sheath</text>
  </g>
</svg>
