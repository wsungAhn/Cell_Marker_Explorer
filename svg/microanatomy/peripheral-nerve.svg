<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Peripheral nerve microanatomy — nerve sheath">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Nerve Sheath</text>
  <g id="peripheral-nerve-sheath" class="microstructure-region" data-microstructure="peripheral-nerve-sheath"
     role="button" tabindex="0" aria-label="Nerve Sheath — click to view cell types">
    <title>Nerve Sheath</title>
    <desc>Cross-section of a peripheral nerve: concentric perineurium wrapping axon bundles ensheathed by Schwann cells.</desc>
    <!-- epineurium / perineurium (concentric rings) -->
    <circle class="region-path" cx="400" cy="300" r="210" fill="#F5E6A3" stroke="#b9a35a" stroke-width="3"/>
    <circle cx="400" cy="300" r="210" fill="none" stroke="#cbb56a" stroke-width="10" opacity="0.6"/>
    <circle cx="400" cy="300" r="180" fill="none" stroke="#cbb56a" stroke-width="5" opacity="0.5"/>
    <!-- axon fascicles (myelinated: dark ring + axon core) -->
    <g>
      <g transform="translate(330,250)"><circle r="34" fill="#fff6cf" stroke="#8a7a3a" stroke-width="8"/><circle r="12" fill="#9c6a3a"/></g>
      <g transform="translate(470,250)"><circle r="30" fill="#fff6cf" stroke="#8a7a3a" stroke-width="7"/><circle r="10" fill="#9c6a3a"/></g>
      <g transform="translate(300,360)"><circle r="28" fill="#fff6cf" stroke="#8a7a3a" stroke-width="7"/><circle r="9" fill="#9c6a3a"/></g>
      <g transform="translate(410,380)"><circle r="36" fill="#fff6cf" stroke="#8a7a3a" stroke-width="8"/><circle r="13" fill="#9c6a3a"/></g>
      <g transform="translate(490,360)"><circle r="26" fill="#fff6cf" stroke="#8a7a3a" stroke-width="6"/><circle r="8" fill="#9c6a3a"/></g>
      <g transform="translate(400,290)"><circle r="24" fill="#fff6cf" stroke="#8a7a3a" stroke-width="6"/><circle r="8" fill="#9c6a3a"/></g>
    </g>
    <!-- Schwann cell nuclei -->
    <g fill="#7a6a2a"><ellipse cx="356" cy="222" rx="6" ry="3"/><ellipse cx="444" cy="278" rx="6" ry="3"/><ellipse cx="436" cy="404" rx="6" ry="3"/></g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="peripheral-nerve-sheath" x="400" y="545" text-anchor="middle" font-size="13" fill="var(--text-secondary)">Nerve Sheath — perineurium + myelinated axon fascicles</text>
  </g>
</svg>
