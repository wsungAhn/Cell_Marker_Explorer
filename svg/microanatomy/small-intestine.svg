<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Small intestine microanatomy — villi and crypts">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Villi &amp; Crypts</text>

  <!-- Villi: finger-like projections (top) -->
  <g id="intestinal-villi" class="microstructure-region" data-microstructure="intestinal-villi"
     role="button" tabindex="0" aria-label="Intestinal Villi — click to view cell types">
    <title>Intestinal Villi</title>
    <desc>Finger-like mucosal projections covered by absorptive enterocytes, goblet and tuft cells, with a central lacteal.</desc>
    <rect class="region-path" x="100" y="80" width="600" height="240" fill="#D4A574" stroke="#8a6a3f" stroke-width="2" opacity="0.3"/>
    <g fill="#e3c39a" stroke="#9c7846" stroke-width="2.5">
      <path d="M150,320 q0,-200 36,-200 q36,0 36,200 z"/>
      <path d="M250,320 q0,-210 36,-210 q36,0 36,210 z"/>
      <path d="M350,320 q0,-200 36,-200 q36,0 36,200 z"/>
      <path d="M450,320 q0,-215 36,-215 q36,0 36,215 z"/>
      <path d="M550,320 q0,-200 36,-200 q36,0 36,200 z"/>
    </g>
    <!-- central lacteals -->
    <g stroke="#cbb56a" stroke-width="4" opacity="0.7"><line x1="186" y1="300" x2="186" y2="150"/><line x1="286" y1="300" x2="286" y2="140"/><line x1="386" y1="300" x2="386" y2="150"/><line x1="486" y1="300" x2="486" y2="135"/><line x1="586" y1="300" x2="586" y2="150"/></g>
    <!-- goblet cells -->
    <g fill="#dff0f5"><circle cx="170" cy="220" r="5"/><circle cx="300" cy="210" r="5"/><circle cx="470" cy="215" r="5"/></g>
  </g>

  <!-- Crypts: base glands (bottom) -->
  <g id="intestinal-crypt" class="microstructure-region" data-microstructure="intestinal-crypt"
     role="button" tabindex="0" aria-label="Intestinal Crypt — click to view cell types">
    <title>Intestinal Crypt (Crypt of Lieberkuhn)</title>
    <desc>Glands at the base of the villi housing intestinal stem cells and Paneth cells.</desc>
    <rect class="region-path" x="100" y="330" width="600" height="190" fill="#c79a64" stroke="#8a6a3f" stroke-width="2"/>
    <!-- crypt tubes -->
    <g fill="none" stroke="#9c7846" stroke-width="12" opacity="0.6" stroke-linecap="round">
      <line x1="186" y1="345" x2="186" y2="490"/><line x1="286" y1="345" x2="286" y2="490"/><line x1="386" y1="345" x2="386" y2="490"/><line x1="486" y1="345" x2="486" y2="490"/><line x1="586" y1="345" x2="586" y2="490"/>
    </g>
    <!-- stem cells (base, green) + Paneth cells (orange granules) -->
    <g fill="#9bbb59"><circle cx="186" cy="480" r="6"/><circle cx="286" cy="480" r="6"/><circle cx="386" cy="480" r="6"/><circle cx="486" cy="480" r="6"/><circle cx="586" cy="480" r="6"/></g>
    <g fill="#e08a4a"><circle cx="186" cy="455" r="5"/><circle cx="386" cy="455" r="5"/><circle cx="586" cy="455" r="5"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="intestinal-villi" x="690" y="180" font-size="12" fill="var(--text-secondary)">Villi</text>
    <text class="region-label" data-for="intestinal-crypt" x="690" y="430" font-size="12" fill="var(--text-secondary)">Crypts</text>
  </g>
</svg>
