<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="small-intestine-microanatomy-title small-intestine-microanatomy-desc">
  <title id="small-intestine-microanatomy-title">Small Intestine microanatomy</title>
  <desc id="small-intestine-microanatomy-desc">Keyboard-accessible microanatomy diagram for Small Intestine with 2 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M150 155 C234 73 548 73 650 155 C730 220 710 445 609 504 C502 567 287 557 182 493 C84 433 74 229 150 155 Z"/>
  <g class="regions-layer">
    <g id="villi" class="microstructure-region" data-microstructure="villi" role="button" tabindex="0" aria-label="Intestinal Villi">
      <title>Intestinal Villi</title>
      <desc>Finger-like projections that increase the absorptive surface area.</desc>
      <path class="region-path" d="M150 155 C234 73 548 73 650 155 C730 220 710 445 609 504 C502 567 287 557 182 493 C84 433 74 229 150 155 Z M164 245 C220 188 246 310 292 246 C338 182 365 312 412 246 C459 180 488 312 535 246 C583 181 618 299 653 250 C670 336 639 435 575 470 C473 527 306 522 215 468 C152 431 128 324 164 245 Z" fill="#D4A574" fill-opacity="0.92"/>
    </g>
    <g id="crypt" class="microstructure-region" data-microstructure="crypt" role="button" tabindex="0" aria-label="Intestinal Crypt (Crypt of Lieberkuhn)">
      <title>Intestinal Crypt (Crypt of Lieberkuhn)</title>
      <desc>Glands at the base of villi containing stem cells and secretory cells.</desc>
      <path class="region-path" d="M164 245 C220 188 246 310 292 246 C338 182 365 312 412 246 C459 180 488 312 535 246 C583 181 618 299 653 250 C670 336 639 435 575 470 C473 527 306 522 215 468 C152 431 128 324 164 245 Z" fill="#D4A574" fill-opacity="0.82"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="villi" x="399" y="178" text-anchor="middle">Intestinal Villi</text>
    <text class="region-label label-small" data-for="crypt" x="399" y="438" text-anchor="middle">Intestinal Crypt (Crypt of Lieberkuhn)</text>
  </g>
</svg>
