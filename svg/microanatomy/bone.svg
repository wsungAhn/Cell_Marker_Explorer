<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="bone-microanatomy-title bone-microanatomy-desc">
  <title id="bone-microanatomy-title">Bone microanatomy</title>
  <desc id="bone-microanatomy-desc">Keyboard-accessible microanatomy diagram for Bone with 1 clickable region.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M151 96 C225 48 318 66 369 126 L431 126 C482 66 575 48 649 96 C722 144 718 263 647 307 C718 351 722 470 649 518 C575 566 482 548 431 488 L369 488 C318 548 225 566 151 518 C78 470 82 351 153 307 C82 263 78 144 151 96 Z"/>
  <g class="regions-layer">
    <g id="marrow-cavity" class="microstructure-region" data-microstructure="marrow-cavity" role="button" tabindex="0" aria-label="Bone Marrow Cavity">
      <title>Bone Marrow Cavity</title>
      <desc>The central cavity of bones containing hematopoietic and stromal cells.</desc>
      <path class="region-path" d="M151 96 C225 48 318 66 369 126 L431 126 C482 66 575 48 649 96 C722 144 718 263 647 307 C718 351 722 470 649 518 C575 566 482 548 431 488 L369 488 C318 548 225 566 151 518 C78 470 82 351 153 307 C82 263 78 144 151 96 Z" fill="#D5C8B8" fill-opacity="0.92"/>
    </g>
  </g>
  <g class="details-layer" aria-hidden="true">
    <path class="detail-line" d="M268 180 C344 235 456 235 532 180 M268 434 C344 379 456 379 532 434 M252 307 H548"/>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="marrow-cavity" x="400" y="312" text-anchor="middle">Bone Marrow Cavity</text>
  </g>
</svg>
