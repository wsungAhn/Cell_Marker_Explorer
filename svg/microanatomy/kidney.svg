<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="group" aria-label="Kidney microanatomy — glomerulus and tubules">
  <rect class="bg" width="800" height="600" fill="var(--bg-primary)"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">Glomerulus &amp; Nephron Tubules</text>

  <!-- Glomerulus: capillary tuft in Bowman's capsule (left) -->
  <g id="glomerulus" class="microstructure-region" data-microstructure="glomerulus"
     role="button" tabindex="0" aria-label="Glomerulus — click to view cell types">
    <title>Glomerulus</title>
    <desc>Capillary tuft within Bowman's capsule: podocytes and mesangial cells performing blood filtration.</desc>
    <circle class="region-path" cx="260" cy="300" r="170" fill="#E8D5A0" stroke="#b9a35a" stroke-width="2.5"/>
    <!-- Bowman's space -->
    <circle cx="260" cy="300" r="140" fill="#f5ecc8" stroke="#cbb56a" stroke-width="2"/>
    <!-- capillary tuft (coiled loops) -->
    <g fill="none" stroke="#c0504d" stroke-width="9" opacity="0.65">
      <path d="M200,300 q20,-50 60,-50 q40,0 60,50 q-20,50 -60,50 q-40,0 -60,-50 z"/>
      <path d="M220,260 q40,-30 80,0"/>
      <path d="M220,340 q40,30 80,0"/>
      <circle cx="260" cy="300" r="34"/>
    </g>
    <!-- podocytes -->
    <g fill="#8a7030"><circle cx="200" cy="250" r="7"/><circle cx="320" cy="250" r="7"/><circle cx="200" cy="350" r="7"/><circle cx="320" cy="350" r="7"/></g>
    <!-- mesangial cell (center) -->
    <circle cx="260" cy="300" r="9" fill="#9bbb59"/>
  </g>

  <!-- Nephron tubules: tubular structures (right) -->
  <g id="nephron-tubules" class="microstructure-region" data-microstructure="nephron-tubules"
     role="button" tabindex="0" aria-label="Nephron Tubules — click to view cell types">
    <title>Nephron Tubules</title>
    <desc>Proximal and distal convoluted tubules lined by reabsorptive epithelial cells.</desc>
    <rect class="region-path" x="470" y="110" width="250" height="380" rx="16" fill="#E8D5A0" stroke="#b9a35a" stroke-width="2" opacity="0.5"/>
    <!-- tubule cross-sections (rings of cuboidal cells) -->
    <g fill="#f3e6c0" stroke="#b9a35a" stroke-width="3">
      <circle cx="540" cy="180" r="44"/><circle cx="650" cy="220" r="40"/><circle cx="520" cy="300" r="46"/><circle cx="640" cy="340" r="42"/><circle cx="560" cy="420" r="44"/>
    </g>
    <!-- lumina -->
    <g fill="#fff"><circle cx="540" cy="180" r="16"/><circle cx="650" cy="220" r="14"/><circle cx="520" cy="300" r="17"/><circle cx="640" cy="340" r="15"/><circle cx="560" cy="420" r="16"/></g>
    <!-- brush-border cell nuclei -->
    <g fill="#8a7030"><circle cx="540" cy="142" r="5"/><circle cx="520" cy="262" r="5"/><circle cx="560" cy="382" r="5"/></g>
  </g>

  <g class="labels-layer">
    <text class="region-label" data-for="glomerulus" x="260" y="500" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Glomerulus</text>
    <text class="region-label" data-for="nephron-tubules" x="595" y="505" text-anchor="middle" font-size="12" fill="var(--text-secondary)">Tubules</text>
  </g>
</svg>
