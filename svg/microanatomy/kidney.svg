<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="group" aria-labelledby="kidney-microanatomy-title kidney-microanatomy-desc">
  <title id="kidney-microanatomy-title">Kidney microanatomy</title>
  <desc id="kidney-microanatomy-desc">Keyboard-accessible microanatomy diagram for Kidney with 2 clickable regions.</desc>
  <style>
    svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .organ-outline {
      fill: var(--bg-secondary);
      stroke: #000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .microstructure-region {
      cursor: pointer;
      outline: none;
    }

    .region-path,
    .detail-line {
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: filter 160ms ease, opacity 160ms ease, stroke-width 160ms ease;
    }

    .region-path {
      stroke-width: 1;
    }

    .detail-line {
      fill: none;
      stroke-width: 1;
      opacity: 0.42;
      pointer-events: none;
    }

    .microstructure-region:hover .region-path,
    .microstructure-region:focus .region-path,
    .microstructure-region:focus-visible .region-path {
      filter: brightness(1.15) drop-shadow(var(--hover-glow));
    }

    .microstructure-region:focus-visible .region-path,
    .microstructure-region.selected .region-path,
    .microstructure-region[aria-pressed="true"] .region-path {
      stroke: var(--accent-blue);
      stroke-width: 2;
    }

    .region-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label-small {
      font-size: 10px;
    }
  </style>
  <path class="organ-outline" d="M442 70 C574 86 668 207 660 344 C652 474 551 544 426 529 C340 519 280 470 248 388 C201 388 163 350 163 303 C163 256 201 218 248 218 C287 124 354 60 442 70 Z"/>
  <g class="regions-layer">
    <g id="glomerulus" class="microstructure-region" data-microstructure="glomerulus" role="button" tabindex="0" aria-label="Glomerulus">
      <title>Glomerulus</title>
      <desc>The filtering unit of the kidney consisting of Bowman&#x27;s capsule and capillary tuft.</desc>
      <path class="region-path" d="M300 202 C338 164 401 168 435 212 C469 257 448 321 393 338 C335 356 279 319 275 263 C273 238 282 218 300 202 Z" fill="#E8D5A0" fill-opacity="0.92"/>
    </g>
    <g id="nephron-tubules" class="microstructure-region" data-microstructure="nephron-tubules" role="button" tabindex="0" aria-label="Nephron Tubules">
      <title>Nephron Tubules</title>
      <desc>Tubular structures that process the glomerular filtrate.</desc>
      <path class="region-path" d="M442 70 C574 86 668 207 660 344 C652 474 551 544 426 529 C340 519 280 470 248 388 C201 388 163 350 163 303 C163 256 201 218 248 218 C287 124 354 60 442 70 Z M300 202 C338 164 401 168 435 212 C469 257 448 321 393 338 C335 356 279 319 275 263 C273 238 282 218 300 202 Z" fill="#E8D5A0" fill-opacity="0.82"/>
    </g>
  </g>
  <g class="labels-layer">
    <text class="region-label" data-for="glomerulus" x="353" y="258" text-anchor="middle">Glomerulus</text>
    <text class="region-label" data-for="nephron-tubules" x="492" y="408" text-anchor="middle">Nephron Tubules</text>
  </g>
</svg>
